services:
  system:
    image: zhangjicmu/ubuntu24_ros:cmu_vla_challenge_simulation
    container_name: iros2026_system
    privileged: true
    network_mode: host
    environment:
      - DISPLAY
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/localtime:/etc/localtime:ro
      - /dev/input:/dev/input
      - /dev/bus/usb:/dev/bus/usb
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ai_module:
    build:
      context: ../ai_module
      dockerfile: docker/Dockerfile
    container_name: iros2026_ai_module
    network_mode: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Tmah 팀이 사용하는 docker-compose 파일 (0706 생성)
  tmah_module:
    build:
      context: ../ai_module
      dockerfile: docker/Dockerfile.tmah
    container_name: iros2026_tmah_module
    network_mode: host
    stdin_open: true
    tty: true
    volumes:
      - ../ai_module/debug:/home/docker/ai_module/debug
    deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]